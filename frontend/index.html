<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/VMS-Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoiceCRM | AI-Powered Lead Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <style>
    .preloader-wrap {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 24px;
      background: linear-gradient(135deg, #04080e 0%, #062d37 100%);
      opacity: 1;
      transition: opacity 0.4s ease-out;
    }
    .preloader-wrap.fade-out { opacity: 0; pointer-events: none; }
    .preloader-logo { 
      width: 80px; 
      height: 80px; 
      position: relative;
      z-index: 1;
      animation: breathe 2s ease-in-out infinite; 
      background: rgba(255,255,255,0.05);
      padding: 12px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .preloader-title {
      position: relative;
      z-index: 1;
      color: #fff; 
      font-family: sans-serif; 
      font-weight: 800; 
      letter-spacing: 0.15em; 
      font-size: 18px;
      text-transform: uppercase;
    }
    @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
  </style>
  <body>
    <!-- Preloader (removed by React after mount) -->
    <div id="preloader" class="preloader-wrap">
      <img src="/VMS-Logo-light.png" alt="VoiceCRM" class="preloader-logo" />
      <div class="preloader-title" style="color: #fff; font-family: sans-serif; font-weight: 800; letter-spacing: 0.1em; font-size: 20px;">VoiceCRM</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
